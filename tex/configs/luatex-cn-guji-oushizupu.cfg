% 欧式族谱.cfg
% European-style genealogy table layout
% Based on default black-and-white template with smaller margins

% =============================================================================
% Grid Calculation
% =============================================================================
%
% Page dimensions:
%   paper-width = 1136pt (40cm), paper-height = 894.6pt (31.5cm)
%   margin: top=80pt, bottom=60pt, left=70pt, right=70pt
%
% Raw content area:
%   content-width  = 1136 - 70 - 70 = 996pt
%   content-height = 894.6 - 80 - 60 = 754.6pt
%
% Border parameters:
%   outer-border-thickness = 4pt
%   outer-border-sep = 3pt
%   border-thickness = 0.4pt
%   border-padding-top = 5pt
%   border-padding-bottom = 5pt
%
% Width calculation:
%   Both sides outer border: 2 × (4pt + 3pt) = 14pt
%   Inner border thickness: 0.4pt
%   Available for grids: 996 - 14 - 0.4 = 981.6pt
%   grid-width = 981.6 / 17 ≈ 57.74pt
%
% Height calculation:
%   Both sides outer border: 2 × (4pt + 3pt) = 14pt
%   Inner border thickness: 0.4pt
%   Padding: 5pt × 2 = 10pt
%   Available for grids: 754.6 - 14 - 0.4 - 10 = 730.2pt
%   grid-height = 730.2 / 21 ≈ 34.77pt
%
% =============================================================================

% ==========================================================================
% Page Geometry
% ==========================================================================
\pageSetup{
    paper-width = 37cm, 
    paper-height = 29cm,  
    margin-top = 3.5cm,       
    margin-bottom = 2.5cm,    
    margin-left = 3.5cm,      
    margin-right = 3.5cm,     
}

% ==========================================================================
% Content Configuration (Grid, Typography, and Border)
% ==========================================================================
\contentSetup{
    % Grid Configuration (17 cols x 21 chars)
    n-column = 8,
    % Typography
    font-size = 28pt,
    line-spacing = 28.5pt,
    vertical-align = center,
    font-color = {0, 0, 0},
    % Number of characters per column
    n-char-per-col = 21,
    border = true,
    outer-border = true,
    % Inner column border thickness
    border-thickness = 0.4pt,
    % Outer frame border thickness
    outer-border-thickness = 4pt,
    % Gap between outer border and inner content
    outer-border-sep = 3pt,
    % Padding inside column border (top and bottom)
    border-padding-top = 5pt,
    border-padding-bottom = 5pt,
    border-color = {0, 0, 0},
}

\sidenodeSetup{
    color = red,
    font-size = 19pt,
    grid-height = 20pt,
    yshift = 0em,
    border-padding-top = 0.5em,
    border-padding-bottom = 0.5em,
}

\pizhuSetup{
    color = 1~0~0,
    font-size = 18pt,
    grid-width = 20pt,
    grid-height = 19pt,
}

\jiazhuSetup{
    align = outward,
    font = {},
    font-color = {0, 0, 0},
}

% =============================================================================
% Banxin (版心) Configuration
% =============================================================================
\banxinSetup{
    banxin = true,
    banxin-upper-ratio = 0.282,
    banxin-middle-ratio = 0.563,
    lower-yuwei = false,
    book-name = {
        font-size = 28pt,
    },
    chapter = {
        font-size = 15pt,
        grid-height = 17pt,
        top-margin = 50pt,
    },
    page-number = {
        font-size = 12pt,
        grid-height = 15pt,
        bottom-padding = 5pt,
    },
    publisher = {
        font-size = 15pt,
        grid-height = 17pt,
    },
}

\endinput
