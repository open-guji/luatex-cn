% luatex-cn-tw-vbook-default.cfg
% Configuration for tw-vbook (Traditional Chinese / Taiwan punctuation)
% Modern vertical book layout with Taiwan-style punctuation
%
% This file includes the common vbook configuration and adds
% Traditional Chinese specific settings.

% Include common vbook settings (page geometry, content layout, titles)
\InputIfFileExists{configs/luatex-cn-vbook-common.cfg}{}{
  \PackageWarning{ltc-tw-vbook}{Common config~luatex-cn-vbook-common.cfg~not~found}
}

% Taiwan Chinese punctuation style
\punctSetup{punct-style=taiwan}

% Footnote configuration in lujiao (陸角) style for modern layout
\腳注設置{number-style=lujiao, indent=2, spacing=0.5em}
