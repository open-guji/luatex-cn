% luatex-cn-guji-SiKuQuanShu-colored.cfg
% Siku Quanshu Colored Layout (四库全书彩色版)
% Inherits from default (black & white) and adds color settings

% =============================================================================
% Load base configuration (black & white version)
% =============================================================================
\gujiSetup{ template = SiKuQuanShu-colored }

% \注{content}
\NewDocumentCommand{\注}{ +m }{%
  \begin{段落}[indent=2]
    \夹注[auto-balance=false]{#1}%
  \end{段落}%
}

% 按环境 - 直接环境形式，支持 \平抬 且保留夹注功能
\NewDocumentEnvironment{按环境}{ }
  {
    \begin{段落}[indent=4]
    \begingroup
    % 应用夹注的字体大小 (0.7 * 28pt = 19.6pt)
    \fontsize{19.6pt}{20pt}\selectfont
    % 设置 jiazhu 属性
    \setluatexattribute\cnverticaljiazhu{1}
    \setluatexattribute\cnverticaljiazhusub{1}
    \setluatexattribute\cnverticaljiazhumode{0}
  }
  {
    \endgroup
    \end{段落}
  }

% \按{content} - 使用按环境，支持 \平抬
\NewDocumentCommand{\按}{ +m }{%
  \begin{按环境}
    #1%
  \end{按环境}
}

\endinput

