% luatex-cn-guji-SiKuQuanShu-colored.cfg
% Siku Quanshu Colored Layout (四库全书彩色版)
% Inherits from default (black & white) and adds color settings

% =============================================================================
% Load base configuration (black & white version)
% =============================================================================
\gujiSetup{ template = SiKuQuanShu-colored }

\banxinSetup{
    banxin-upper-ratio = 0.32,  
    banxin-middle-ratio = 0.52, 
    chapter = { align = right },
}

% \书名签{副标题内容}
% 封面上带双层边框的竖排标题框
% 例: \书名签{經部\空格[4] 簡明目錄卷一}
\NewDocumentCommand{\四库全书书名签}{ +m }{%
  \文本框[
    floating=true,
    x=15.3cm,
    y=0.3cm,
    grid-height=56pt,
    grid-width=92pt,
    border-shape=rect,
    border-width=2pt,
    border-margin=4pt,
    outer-border=true,
    outer-border-thickness=6pt,
    outer-border-sep=4pt,
    font-size=52pt,
    height=24cm
  ]{欽定四庫全書\夹注[align=center,font-size=20pt]{\样式[grid-height=24pt]{#1}}}%
}

% \校对页{覆勘内容}{协勘内容}{謄錄内容}
% 校对页：三个浮动文本框，分别为覆勘、协勘、謄錄信息
% 例: \校对页{檢討\臣 翁樹培覆勘}{協勘官候補洗馬\臣 劉權之}{\样式[grid-height=36pt]{謄錄舉人}\臣 李學沅}
\NewDocumentCommand{\校对页}{ +m +m +m }{%
  \begin{空白页}
    \文本框[
      floating=true,
      x=5cm,
      y=10cm,
      font-size=28pt,
      grid-height=28pt,
      height=8]{#1}%
    \文本框[
      floating=true,
      x=13cm,
      y=15cm,
      font-size=28pt,
      grid-height=28pt,
      height=11]{#2}%
    \文本框[
      floating=true,
      x=14.5cm,
      y=16.8cm,
      font-size=28pt,
      grid-height=28pt,
      height=10]{#3}%
  \end{空白页}%
}

\endinput

