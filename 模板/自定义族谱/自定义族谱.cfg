% 自定义族谱配置
% 基于欧式族谱模板，调整版心宽度为 1 倍列宽

\input{configs/luatex-cn-guji-oushizupu.cfg}

% 覆盖版心比例：从默认 0.7 改为 1（版心列宽 = 正文列宽）
% 外边框加粗：从默认 4pt 改为 6pt
\pageSetup{
    paper-width = 37.2cm, 
    paper-height = 29.2cm,  
    margin-top = 2.5cm,       
    margin-bottom = 2.5cm,    
    margin-left = 3.5cm,      
    margin-right = 3.5cm,     
}

\contentSetup{
    n-column = 8,
    banxin-ratio = 1.2,
    % inner frame border thickness
    border-thickness = 0.4pt,
    % Outer frame border thickness
    outer-border-thickness = 6pt,
    % Gap between outer border and inner content
    outer-border-sep = 3pt,
    padding-top = 5pt,
    padding-bottom = 5pt
}

\banxinSetup{
    upper-section = {
        font-size = 40pt,
    },
    middle-section = {
        grid-height = 32pt,
        font-size = 32pt,
        top-margin = 0pt,
    },
    page-number = {
        font-size = 15pt,
    },
    lower-section = {
        font-size = 40pt,
    },
}

\endinput
