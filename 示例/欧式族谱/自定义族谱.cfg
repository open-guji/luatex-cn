% 自定义族谱配置
% 基于欧式族谱模板，调整版心宽度为 1 倍列宽

\input{configs/luatex-cn-guji-oushizupu.cfg}

% 覆盖版心比例：从默认 0.7 改为 1（版心列宽 = 正文列宽）
% 外边框加粗：从默认 4pt 改为 6pt
\contentSetup{
    banxin-ratio = 1,
    outer-border-thickness = 6pt,
}

\banxinSetup{
    font=TW-Kai,
    book-name = {
        font-size = 40pt,
    },
    chapter = {
        grid-height = 32pt,
        font-size = 32pt,
    },
    page-number = {
        font-size = 15pt,
    },
    publisher = {
        font-size = 40pt,
    },
}

\endinput
